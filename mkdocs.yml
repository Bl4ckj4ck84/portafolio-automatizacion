
site_name: Cristian - Portafolio de Automatización
site_description: Técnico en Automatización Industrial | PLC | IoT | Control de Procesos
site_author: Cristian Ch.
site_url: https://bl4ckj4ck84.github.io/portafolio-automatizacion

theme:
  name: material
  language: es
  palette:
    primary: deep orange
    accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy
    - navigation.top

nav:
  - Inicio: index.md
  - Sobre Mí: sobre-mi.md
  - Proyectos:
     - Cooling Colmena: proyectos/cooling-colmena.md
     - Instalación Eléctrica Domiciliaria: proyectos/instalacion-electrica-domiciliaria.md
     - Instalación Solar Residencial: proyectos/instalacion-solar-residencial.md
     - Próximamente: proyectos/proximamente.md
  - Certificaciones: certificaciones.md
  - Habilidades: habilidades.md
  - Contacto: contacto.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.mark
  - attr_list
  - tables
  - admonition
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/BL4ckj4ck84
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/tu-perfil
      name: LinkedIn

extra_css:
  - css/industrial.css

copyright: |
  © 2026 Cristian Chávez - Técnico en Automatización Industrial
